services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omp-lowmem-backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SERVER_ADDR: ":8080"

      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-omp}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-omp_dev_password}
      DB_NAME: ${POSTGRES_DB:-openmusicplayer}

      # Low-memory default: no Redis-backed queue/pubsub/download APIs.
      # Set REDIS_ENABLED=true and start the downloads profile only when those paths are under test.
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      REDIS_ADDR: redis:6379
      REDIS_URL: redis://redis:6379

      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-audio-files}
      MINIO_USE_SSL: "false"
      S3_USE_PATH_STYLE: "true"

      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      WORKER_COUNT: ${WORKER_COUNT:-0}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - omp-lowmem-network

  postgres:
    image: postgres:15-alpine
    container_name: omp-lowmem-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omp_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-openmusicplayer}
    volumes:
      - postgres_lowmem_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omp} -d ${POSTGRES_DB:-openmusicplayer}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - omp-lowmem-network

  minio:
    image: minio/minio:latest
    container_name: omp-lowmem-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_lowmem_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - omp-lowmem-network

  minio-init:
    image: minio/mc:latest
    container_name: omp-lowmem-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/$${MINIO_BUCKET:-audio-files} --ignore-existing;
      mc anonymous set none local/$${MINIO_BUCKET:-audio-files};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-audio-files}
    networks:
      - omp-lowmem-network

  redis:
    image: redis:7-alpine
    container_name: omp-lowmem-redis
    restart: unless-stopped
    profiles:
      - downloads
    ports:
      - "${REDIS_PORT:-6380}:6379"
    command: redis-server --save "" --appendonly no --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - omp-lowmem-network

  minio-smoke:
    image: minio/mc:latest
    profiles:
      - smoke
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc ls local/$${MINIO_BUCKET:-audio-files};
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-audio-files}
    networks:
      - omp-lowmem-network

networks:
  omp-lowmem-network:
    driver: bridge

volumes:
  postgres_lowmem_data:
  minio_lowmem_data:
