openapi: 3.0.3
info:
  title: Open Music Player API
  description: |
    API for the Open Music Player application.
    Provides endpoints for authentication, music search (via MusicBrainz),
    library management, playlists, downloads, signed playback URLs, queue management,
    and explicit YouTube playlist imports.
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8000/api/v1
    description: Local development server
  - url: https://api.openmusicplayer.app/v1
    description: Production server

tags:
  - name: Auth
    description: Authentication and user management
  - name: Search
    description: Search MusicBrainz for tracks, artists, and albums
  - name: Browse
    description: Browse/discovery for artists, albums, and tracks
  - name: Library
    description: User's track collection management
  - name: Playlists
    description: Playlist CRUD and track management
  - name: MixPlans
    description: Durable saved mix-plan contract; client owns playback and rendering
  - name: Downloads
    description: Download management and progress tracking
  - name: PlaylistImports
    description: Explicit YouTube/YouTube Music playlist import jobs
  - name: Playback
    description: Signed direct object URL issuance for playback and offline downloads
  - name: Queue
    description: Playback queue management
  - name: SourceSelections
    description: Server-owned discovery source decisions and audit records

security:
  - BearerAuth: []

paths:
  # ============================================================================
  # Auth Endpoints
  # ============================================================================
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login with credentials
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout and invalidate tokens
      operationId: logoutUser
      responses:
        '204':
          description: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================================================================
  # Search Endpoints
  # ============================================================================
  /search/tracks:
    get:
      tags:
        - Search
      summary: Search for tracks on MusicBrainz
      operationId: searchTracks
      parameters:
        - $ref: '#/components/parameters/QueryParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackSearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /search/artists:
    get:
      tags:
        - Search
      summary: Search for artists on MusicBrainz
      operationId: searchArtists
      parameters:
        - $ref: '#/components/parameters/QueryParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistSearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /search/albums:
    get:
      tags:
        - Search
      summary: Search for albums on MusicBrainz
      operationId: searchAlbums
      parameters:
        - $ref: '#/components/parameters/QueryParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumSearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================================================================
  # Browse/Discovery Endpoints
  # ============================================================================
  /artists/{mb_id}:
    get:
      tags:
        - Browse
      summary: Get artist details with discography
      operationId: getArtist
      parameters:
        - $ref: '#/components/parameters/MusicBrainzIdParam'
      responses:
        '200':
          description: Artist details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /albums/{mb_id}:
    get:
      tags:
        - Browse
      summary: Get album details with track listing
      operationId: getAlbum
      parameters:
        - $ref: '#/components/parameters/MusicBrainzIdParam'
      responses:
        '200':
          description: Album details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /tracks/{mb_id}:
    get:
      tags:
        - Browse
      summary: Get track details
      operationId: getTrack
      parameters:
        - $ref: '#/components/parameters/MusicBrainzIdParam'
      responses:
        '200':
          description: Track details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /discovery/search:
    get:
      tags: [Browse]
      summary: Search ranked source candidates and create a short-lived selection session
      operationId: discoverySearch
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 1 }
        - name: providers
          in: query
          schema: { type: string, description: Comma-separated provider names. }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 25 }
      responses:
        '200':
          description: Ranked candidates; selectionRequired is false only when results is empty.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DiscoverySearchResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/Unavailable' }

  /discovery/resolve-url:
    post:
      tags: [Browse]
      summary: Resolve a pasted supported URL and create a short-lived selection session
      operationId: resolveDiscoveryURL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [url]
              properties: { url: { type: string, format: uri } }
      responses:
        '200':
          description: Resolved candidate and selection session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ResolveDiscoveryURLResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/BadRequest' }
        '503': { $ref: '#/components/responses/Unavailable' }

  /discovery/assist:
    post:
      tags: [Browse]
      summary: Ground an assistant request in discovered candidates and create a selection session when candidates are returned
      operationId: assistDiscovery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [prompt]
              properties:
                prompt: { type: string, minLength: 1 }
                limit: { type: integer, minimum: 1, maximum: 25 }
      responses:
        '200':
          description: Grounded assistant response. Selection metadata is top-level for direct and nested search candidates.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DiscoveryAssistResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/Unavailable' }

  # ============================================================================
  # Library Endpoints
  # ============================================================================
  /library/tracks:
    get:
      tags:
        - Library
      summary: Get user's track library
      operationId: getLibraryTracks
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/CursorParam'
        - name: sort
          in: query
          schema:
            type: string
            enum: [title, artist, album, added_at, duration]
            default: added_at
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: List of tracks in library
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Library
      summary: Add a track to library
      operationId: addTrackToLibrary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTrackRequest'
      responses:
        '201':
          description: Track added to library
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Track'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Track already in library
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /library/tracks/{trackId}:
    get:
      tags:
        - Library
      summary: Get a specific track from library
      operationId: getLibraryTrack
      parameters:
        - $ref: '#/components/parameters/TrackIdParam'
      responses:
        '200':
          description: Track details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Track'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Library
      summary: Remove a track from library
      operationId: removeTrackFromLibrary
      parameters:
        - $ref: '#/components/parameters/TrackIdParam'
      responses:
        '204':
          description: Track removed from library
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================================
  # Playlist Endpoints
  # ============================================================================
  /playlists:
    get:
      tags:
        - Playlists
      summary: Get user's playlists
      operationId: getPlaylists
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: List of playlists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Playlists
      summary: Create a new playlist
      operationId: createPlaylist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlaylistRequest'
      responses:
        '201':
          description: Playlist created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /playlists/{playlistId}:
    get:
      tags:
        - Playlists
      summary: Get playlist details
      operationId: getPlaylist
      parameters:
        - $ref: '#/components/parameters/PlaylistIdParam'
      responses:
        '200':
          description: Playlist details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistWithTracks'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Playlists
      summary: Update playlist details
      operationId: updatePlaylist
      parameters:
        - $ref: '#/components/parameters/PlaylistIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlaylistRequest'
      responses:
        '200':
          description: Playlist updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Playlists
      summary: Delete a playlist
      operationId: deletePlaylist
      parameters:
        - $ref: '#/components/parameters/PlaylistIdParam'
      responses:
        '204':
          description: Playlist deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /playlists/{playlistId}/tracks:
    get:
      tags:
        - Playlists
      summary: Get tracks in a playlist
      operationId: getPlaylistTracks
      parameters:
        - $ref: '#/components/parameters/PlaylistIdParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: List of tracks in playlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags:
        - Playlists
      summary: Add tracks to playlist
      operationId: addTracksToPlaylist
      parameters:
        - $ref: '#/components/parameters/PlaylistIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTracksRequest'
      responses:
        '200':
          description: Tracks added to playlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /playlists/{playlistId}/tracks/{trackId}:
    delete:
      tags:
        - Playlists
      summary: Remove a track from playlist
      operationId: removeTrackFromPlaylist
      parameters:
        - $ref: '#/components/parameters/PlaylistIdParam'
        - $ref: '#/components/parameters/TrackIdParam'
      responses:
        '204':
          description: Track removed from playlist
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /playlists/{playlistId}/tracks/reorder:
    post:
      tags:
        - Playlists
      summary: Reorder tracks in playlist
      operationId: reorderPlaylistTracks
      parameters:
        - $ref: '#/components/parameters/PlaylistIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderTracksRequest'
      responses:
        '200':
          description: Tracks reordered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistWithTracks'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================================
  # Playlist Import Endpoints
  # ============================================================================
  /playlist-imports:
    post:
      tags:
        - PlaylistImports
      summary: Import a YouTube playlist into an OMP playlist
      description: Enumerates playlist metadata with yt-dlp without downloading during enumeration, reuses known tracks, and queues missing tracks through the download pipeline.
      operationId: createPlaylistImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlaylistImportRequest'
      responses:
        '202':
          description: Playlist import accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistImport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: Playlist exceeds maxItems limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /playlist-imports/{importJobId}:
    get:
      tags:
        - PlaylistImports
      summary: Get playlist import status and per-item results
      operationId: getPlaylistImport
      parameters:
        - name: importJobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Playlist import status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistImport'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================================
  # Saved Mix Plan Endpoints
  # ============================================================================
  /mix-plans:
    get:
      tags:
        - MixPlans
      summary: List saved mix plans
      description: Returns durable saved mix plans for the authenticated user. Playback queues, playhead, fades execution, BPM/key, stems, cache, and rendering state are intentionally out of scope.
      operationId: listMixPlans
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Saved mix plans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MixPlanListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - MixPlans
      summary: Create a saved mix plan
      description: Stores versioned clip layout state only. The client remains responsible for playback and rendering.
      operationId: createMixPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveMixPlanRequest'
      responses:
        '201':
          description: Mix plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MixPlan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /mix-plans/{mixPlanId}:
    get:
      tags:
        - MixPlans
      summary: Get a saved mix plan
      operationId: getMixPlan
      parameters:
        - $ref: '#/components/parameters/MixPlanIdParam'
      responses:
        '200':
          description: Saved mix plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MixPlan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - MixPlans
      summary: Update a saved mix plan
      description: Requires the current optimistic version in the request body. A stale version returns 409.
      operationId: updateMixPlan
      parameters:
        - $ref: '#/components/parameters/MixPlanIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMixPlanRequest'
      responses:
        '200':
          description: Mix plan updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MixPlan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Optimistic version conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ============================================================================
  # Download Endpoints
  # ============================================================================
  /downloads:
    get:
      tags:
        - Downloads
      summary: Get all download jobs
      operationId: getDownloads
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, downloading, processing, uploading, complete, failed]
      responses:
        '200':
          description: List of download jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Downloads
      summary: Queue a direct source URL for background library import
      operationId: initiateDownload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiateDownloadRequest'
      responses:
        '201':
          description: Download job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitiateDownloadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /downloads/{job_id}:
    get:
      tags:
        - Downloads
      summary: Get download job status
      operationId: getDownloadStatus
      parameters:
        - $ref: '#/components/parameters/DownloadJobIdParam'
      responses:
        '200':
          description: Download job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadJob'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'


  /ws/progress:
    get:
      tags:
        - Downloads
      summary: WebSocket endpoint for real-time progress tracking
      description: |
        WebSocket connection for real-time download progress updates.
        Authentication is done via query parameter since browser WebSocket API
        doesn't support custom headers.

        **Connection URL:** `ws://localhost:8000/api/v1/ws/progress?token=<jwt_access_token>`

        **Message format (server -> client):**
        ```json
        {
          "type": "download_progress",
          "job_id": 123,
          "status": "downloading",
          "progress": 45,
          "track_title": "Song Title",
          "artist_name": "Artist Name",
          "error": ""
        }
        ```

        **Status values:** `queued`, `downloading`, `processing`, `uploading`, `complete`, `failed`

        The connection will automatically receive ping/pong messages every 54 seconds
        to keep the connection alive.
      operationId: progressWebSocket
      security: []
      parameters:
        - name: token
          in: query
          required: true
          description: JWT access token for authentication
          schema:
            type: string
      responses:
        '101':
          description: Switching Protocols to WebSocket
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================================================================
  # Playback Endpoints
  # ============================================================================
  /playback/urls:
    post:
      tags:
        - Playback
      summary: Issue signed direct audio URLs
      description: |
        Issues short-lived signed object-storage URLs for tracks already in the
        authenticated user's library. Clients use the returned URLs directly for
        playback or offline downloads instead of proxying audio bytes through
        the backend.
      operationId: createPlaybackUrls
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaybackURLRequest'
            example:
              trackIds: [42]
              ttlSeconds: 600
      responses:
        '200':
          description: Signed playback URL descriptors and per-track unavailable entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaybackURLResponse'
              example:
                urls:
                  - trackId: 42
                    url: https://storage.example.test/open-music/tracks/42.mp3?X-Amz-Signature=...
                    expiresAt: '2026-06-03T16:15:00Z'
                    contentType: audio/mpeg
                    sizeBytes: 12345678
                    etag: '"abc123"'
                    storageKeyVersion: v1
                unavailable: []
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================================
  # Queue Endpoints
  # ============================================================================
  /queue:
    get:
      tags:
        - Queue
      summary: Get current playback queue
      operationId: getQueue
      responses:
        '200':
          description: Current queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags:
        - Queue
      summary: Clear the queue
      operationId: clearQueue
      responses:
        '200':
          description: Queue cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /source-selections:
    get:
      tags: [SourceSelections]
      summary: List the authenticated user's source selection audit records
      operationId: listSourceSelections
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Source selection audit page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceSelectionListResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [SourceSelections]
      summary: Create an accepted or overridden decision from a discovery session
      operationId: createSourceSelection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSourceSelectionRequest'
      responses:
        '201':
          description: Durable source selection decision
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SourceSelectionDecision' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413':
          description: Source selection request exceeds the documented body limit.

  /source-selections/{id}:
    get:
      tags: [SourceSelections]
      summary: Get an authenticated user's source selection audit record
      operationId: getSourceSelection
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Source selection decision
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SourceSelectionDecision' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /queue/items:
    post:
      tags:
        - Queue
      summary: Add a playable track or a source selected by a durable decision to the queue
      operationId: addQueueItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddQueueItemRequest'
      responses:
        '200':
          description: Playable track added to queue, or an idempotent source-decision replay.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/QueueResponse'
                  - $ref: '#/components/schemas/SourceDecisionQueueResponse'
        '202':
          description: Source candidate queued for download
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceDecisionQueueResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /queue/items/{queueItemId}:
    delete:
      tags:
        - Queue
      summary: Remove a queue item by durable queue item ID
      operationId: removeQueueItem
      parameters:
        - name: queueItemId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Queue item removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /queue/items/{queueItemId}/retry:
    post:
      tags:
        - Queue
      summary: Retry a failed download-backed queue item
      operationId: retryQueueItem
      parameters:
        - name: queueItemId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Queue item retry started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /queue/reorder:
    put:
      tags:
        - Queue
      summary: Reorder a queue item by durable item ID
      operationId: reorderQueue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderQueueRequest'
      responses:
        '200':
          description: Queue reordered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token

  parameters:
    QueryParam:
      name: q
      in: query
      required: true
      description: Search query string
      schema:
        type: string
        minLength: 1
        maxLength: 500

    LimitParam:
      name: limit
      in: query
      description: Maximum number of items to return
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    OffsetParam:
      name: offset
      in: query
      description: Number of items to skip
      schema:
        type: integer
        minimum: 0
        default: 0

    CursorParam:
      name: cursor
      in: query
      description: Cursor for pagination (alternative to offset)
      schema:
        type: string

    TrackIdParam:
      name: trackId
      in: path
      required: true
      description: Track unique identifier
      schema:
        type: string
        format: uuid

    PlaylistIdParam:
      name: playlistId
      in: path
      required: true
      description: Playlist unique identifier
      schema:
        type: string
        format: uuid

    MixPlanIdParam:
      name: mixPlanId
      in: path
      required: true
      description: Saved mix plan unique identifier
      schema:
        type: string
        format: uuid

    DownloadJobIdParam:
      name: job_id
      in: path
      required: true
      description: Download job unique identifier
      schema:
        type: string
        format: uuid

    MusicBrainzIdParam:
      name: mb_id
      in: path
      required: true
      description: MusicBrainz unique identifier (UUID)
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Conflict:
      description: Request conflicts with existing state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unavailable:
      description: Required service or persistence is unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # ========================================================================
    # Auth Schemas
    # ========================================================================
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - username
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        username:
          type: string
          minLength: 3
          maxLength: 50

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresIn
        - user
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Access token expiration time in seconds
        user:
          $ref: '#/components/schemas/User'

    # ========================================================================
    # User Schema
    # ========================================================================
    User:
      type: object
      required:
        - id
        - email
        - username
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ========================================================================
    # Track Schemas
    # ========================================================================
    Track:
      type: object
      required:
        - id
        - title
        - duration
        - addedAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        artist:
          type: string
        album:
          type: string
        duration:
          type: integer
          description: Duration in seconds
        trackNumber:
          type: integer
        discNumber:
          type: integer
        year:
          type: integer
        genre:
          type: string
        mbid:
          type: string
          description: MusicBrainz recording ID
        coverUrl:
          type: string
          format: uri
        filePath:
          type: string
          description: Local file path (only for downloaded tracks)
        addedAt:
          type: string
          format: date-time

    TrackResult:
      type: object
      required:
        - mbid
        - title
      properties:
        mbid:
          type: string
          description: MusicBrainz recording ID
        title:
          type: string
        artist:
          type: string
        artistMbid:
          type: string
        album:
          type: string
        albumMbid:
          type: string
        duration:
          type: integer
          description: Duration in milliseconds
        trackNumber:
          type: integer
        releaseDate:
          type: string
        score:
          type: integer
          description: Search relevance score (0-100)

    TrackSearchResponse:
      type: object
      required:
        - results
        - total
        - limit
        - offset
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/TrackResult'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    TrackListResponse:
      type: object
      required:
        - tracks
        - total
        - limit
        - offset
      properties:
        tracks:
          type: array
          items:
            $ref: '#/components/schemas/Track'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        cursor:
          type: string
          description: Cursor for next page (if using cursor pagination)

    AddTrackRequest:
      type: object
      required:
        - mbid
      properties:
        mbid:
          type: string
          description: MusicBrainz recording ID

    # ========================================================================
    # Artist Schemas
    # ========================================================================
    ArtistResult:
      type: object
      required:
        - mbid
        - name
      properties:
        mbid:
          type: string
          description: MusicBrainz artist ID
        name:
          type: string
        sortName:
          type: string
        type:
          type: string
          enum: [person, group, orchestra, choir, character, other]
        country:
          type: string
        disambiguation:
          type: string
        score:
          type: integer
          description: Search relevance score (0-100)

    ArtistSearchResponse:
      type: object
      required:
        - results
        - total
        - limit
        - offset
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/ArtistResult'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    ArtistDetail:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: MusicBrainz artist ID
        name:
          type: string
        sortName:
          type: string
        type:
          type: string
          description: Artist type (person, group, orchestra, choir, character, other)
        country:
          type: string
          description: Country code
        disambiguation:
          type: string
          description: Disambiguation comment
        beginDate:
          type: string
          description: Date formed/born
        endDate:
          type: string
          description: Date disbanded/died
        releases:
          type: array
          items:
            $ref: '#/components/schemas/ReleaseInfo'
          description: Artist's discography

    ReleaseInfo:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: string
          description: MusicBrainz release group ID
        title:
          type: string
        date:
          type: string
          description: Release date
        coverArtUrl:
          type: string
          format: uri
          description: Cover art URL from Cover Art Archive

    # ========================================================================
    # Album Schemas
    # ========================================================================
    AlbumResult:
      type: object
      required:
        - mbid
        - title
      properties:
        mbid:
          type: string
          description: MusicBrainz release group ID
        title:
          type: string
        artist:
          type: string
        artistMbid:
          type: string
        releaseDate:
          type: string
        primaryType:
          type: string
          enum: [album, single, ep, broadcast, other]
        secondaryTypes:
          type: array
          items:
            type: string
        trackCount:
          type: integer
        score:
          type: integer
          description: Search relevance score (0-100)

    AlbumSearchResponse:
      type: object
      required:
        - results
        - total
        - limit
        - offset
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/AlbumResult'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    AlbumDetail:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: string
          description: MusicBrainz release ID
        title:
          type: string
        artist:
          type: string
        artistId:
          type: string
          description: MusicBrainz artist ID
        date:
          type: string
          description: Release date
        country:
          type: string
          description: Release country
        trackCount:
          type: integer
        coverArtUrl:
          type: string
          format: uri
          description: Cover art URL from Cover Art Archive
        tracks:
          type: array
          items:
            $ref: '#/components/schemas/TrackDetail'
          description: Track listing

    TrackDetail:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: string
          description: MusicBrainz recording ID
        title:
          type: string
        artist:
          type: string
        artistId:
          type: string
          description: MusicBrainz artist ID
        album:
          type: string
        albumId:
          type: string
          description: MusicBrainz release ID
        duration:
          type: integer
          description: Duration in milliseconds
        position:
          type: integer
          description: Track position on album
        inLibrary:
          type: boolean
          description: Whether track is in user's library
        downloadable:
          type: boolean
          description: Whether track can be downloaded

    # ========================================================================
    # Playlist Schemas
    # ========================================================================
    Playlist:
      type: object
      required:
        - id
        - name
        - trackCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        trackCount:
          type: integer
        totalDuration:
          type: integer
          description: Total duration in seconds
        coverUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PlaylistWithTracks:
      allOf:
        - $ref: '#/components/schemas/Playlist'
        - type: object
          properties:
            tracks:
              type: array
              items:
                $ref: '#/components/schemas/PlaylistTrack'

    PlaylistTrack:
      allOf:
        - $ref: '#/components/schemas/Track'
        - type: object
          required:
            - position
          properties:
            position:
              type: integer
              description: Position in playlist (0-indexed)

    PlaylistListResponse:
      type: object
      required:
        - playlists
        - total
        - limit
        - offset
      properties:
        playlists:
          type: array
          items:
            $ref: '#/components/schemas/Playlist'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    CreatePlaylistRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        trackIds:
          type: array
          items:
            type: string
            format: uuid
          description: Initial tracks to add to playlist

    UpdatePlaylistRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 1000

    AddTracksRequest:
      type: object
      required:
        - trackIds
      properties:
        trackIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
        position:
          type: integer
          description: Position to insert tracks (appends to end if not specified)

    ReorderTracksRequest:
      type: object
      required:
        - trackId
        - newPosition
      properties:
        trackId:
          type: string
          format: uuid
        newPosition:
          type: integer
          minimum: 0

    # ========================================================================
    # Playlist Import Schemas
    # ========================================================================
    CreatePlaylistImportRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: YouTube or YouTube Music playlist URL.
        playlistId:
          type: integer
          format: int64
          description: Existing OMP playlist to import into; omitted creates a playlist.
        name:
          type: string
          description: Name for a newly-created playlist.
        description:
          type: string
        maxItems:
          type: integer
          minimum: 1
          maximum: 1000
          description: Per-request cap, bounded by the server default.

    PlaylistImport:
      type: object
      required:
        - id
        - playlistId
        - sourceUrl
        - status
        - totalItems
        - importedItems
        - queuedItems
        - failedItems
        - skippedItems
        - maxItems
        - createdAt
        - updatedAt
        - items
      properties:
        id:
          type: string
          format: uuid
        playlistId:
          type: integer
          format: int64
        sourceUrl:
          type: string
          format: uri
        sourceTitle:
          type: string
        status:
          type: string
          enum: [resolving, importing, complete, partial_failure, failed, cancelled]
        totalItems:
          type: integer
        importedItems:
          type: integer
        queuedItems:
          type: integer
        failedItems:
          type: integer
        skippedItems:
          type: integer
        maxItems:
          type: integer
        error:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/PlaylistImportItem'

    PlaylistImportItem:
      type: object
      required:
        - id
        - sourceIndex
        - playlistPosition
        - status
      properties:
        id:
          type: integer
          format: int64
        sourceIndex:
          type: integer
          description: 1-indexed order from the source playlist.
        playlistPosition:
          type: integer
          description: 0-indexed target playlist order for successful/reused items.
        sourceId:
          type: string
        sourceUrl:
          type: string
          format: uri
        title:
          type: string
        artist:
          type: string
        album:
          type: string
        uploader:
          type: string
        durationMs:
          type: integer
        thumbnailUrl:
          type: string
          format: uri
        status:
          type: string
          enum: [pending, queued, downloading, processing, imported, failed, skipped_duplicate, cancelled]
        error:
          type: string
        trackId:
          type: integer
          format: int64
        downloadJobId:
          type: string
          format: uuid

    # ========================================================================

    # Playback Schemas
    # =================================================================
    PlaybackURLRequest:
      type: object
      required:
        - trackIds
      properties:
        trackIds:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: integer
            format: int64
            minimum: 1
          description: Track IDs to issue signed URLs for.
        ttlSeconds:
          type: integer
          minimum: 60
          maximum: 1800
          description: Requested URL lifetime in seconds; omitted values use the server default.

    PlaybackURLResponse:
      type: object
      required:
        - urls
      properties:
        urls:
          type: array
          items:
            $ref: '#/components/schemas/PlaybackURLItem'
        unavailable:
          type: array
          items:
            $ref: '#/components/schemas/PlaybackUnavailableItem'
          description: Tracks that are authorized but do not currently have an available audio object.

    PlaybackURLItem:
      type: object
      required:
        - trackId
        - url
        - expiresAt
        - contentType
        - sizeBytes
      properties:
        trackId:
          type: integer
          format: int64
        url:
          type: string
          format: uri
          description: Short-lived signed object URL to use directly for playback/download.
        expiresAt:
          type: string
          format: date-time
        contentType:
          type: string
          example: audio/mpeg
        sizeBytes:
          type: integer
          format: int64
          minimum: 0
        etag:
          type: string
        storageKeyVersion:
          type: string

    PlaybackUnavailableItem:
      type: object
      required:
        - trackId
        - code
        - message
      properties:
        trackId:
          type: integer
          format: int64
        code:
          type: string
          example: audio_unavailable
        message:
          type: string

    # Saved Mix Plan Schemas
    # ========================================================================
    MixPlanClip:
      type: object
      required:
        - clipId
        - queueItemId
        - trackId
        - sourceStartMs
        - sourceEndMs
        - timelineStartMs
        - gainDb
      properties:
        clipId:
          type: string
          minLength: 1
          description: Stable client-owned clip identifier within the plan.
        queueItemId:
          type: string
          minLength: 1
          description: Durable queue item identity this clip was planned from. Timing is persisted in the mix plan payload; queueItemId is only the stable link back to queue/download state.
        trackId:
          type: integer
          format: int64
          description: Track ID from the authenticated user's library. Multiple clips may reference the same track.
        sourceStartMs:
          type: integer
          format: int64
          minimum: 0
          description: Source media start offset in milliseconds.
        sourceEndMs:
          type: integer
          format: int64
          minimum: 1
          description: Source media end offset in milliseconds; must be greater than sourceStartMs.
        timelineStartMs:
          type: integer
          format: int64
          minimum: 0
          description: Timeline start offset in milliseconds. timelineEndMs is derived as timelineStartMs + sourceEndMs - sourceStartMs and is not accepted as request state.
        gainDb:
          type: number
          format: double
          description: Static clip gain hook in decibels. The backend stores the value but does not execute audio gain.
        fadeInMs:
          type: integer
          format: int64
          minimum: 0
          description: Future fade-in hook in milliseconds. Stored as plan metadata only; no backend audio engine behavior in v1.
        fadeOutMs:
          type: integer
          format: int64
          minimum: 0
          description: Future fade-out hook in milliseconds. Stored as plan metadata only; no backend audio engine behavior in v1.

    MixPlanClipResponse:
      allOf:
        - $ref: '#/components/schemas/MixPlanClip'
        - type: object
          required:
            - timelineEndMs
          properties:
            timelineEndMs:
              type: integer
              format: int64
              minimum: 0
              readOnly: true
              description: Derived timeline end offset in milliseconds; equal to timelineStartMs + sourceEndMs - sourceStartMs and never persisted independently.

    SaveMixPlanRequest:
      type: object
      required:
        - schemaVersion
        - name
        - clips
      properties:
        schemaVersion:
          type: integer
          enum: [1]
          description: MVP schema version. Timing persists in the lightweight mix_plans store; Redis queue items remain download/playback state. Future BPM/key/cue/stems/time-stretch fields must use a future schema version and are not required behavior in v1.
        name:
          type: string
          minLength: 1
          maxLength: 255
        clips:
          type: array
          items:
            $ref: '#/components/schemas/MixPlanClip'
          description: Client-rendered clip layout. Empty arrays are allowed for draft plans.

    UpdateMixPlanRequest:
      allOf:
        - $ref: '#/components/schemas/SaveMixPlanRequest'
        - type: object
          required:
            - version
          properties:
            version:
              type: integer
              minimum: 1
              description: Optimistic concurrency token returned by the last create/read/update response.

    MixPlanSummary:
      type: object
      required:
        - clipCount
        - trackIds
        - durationMs
      properties:
        clipCount:
          type: integer
          minimum: 0
        trackIds:
          type: array
          items:
            type: integer
            format: int64
          description: Unique referenced track IDs, sorted ascending.
        durationMs:
          type: integer
          format: int64
          minimum: 0
          description: Derived plan duration in milliseconds; not a server playhead.

    MixPlan:
      type: object
      required:
        - id
        - schemaVersion
        - name
        - clips
        - summary
        - version
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        schemaVersion:
          type: integer
          enum: [1]
        name:
          type: string
        clips:
          type: array
          items:
            $ref: '#/components/schemas/MixPlanClipResponse'
        summary:
          $ref: '#/components/schemas/MixPlanSummary'
        version:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MixPlanListResponse:
      type: object
      required:
        - data
        - total
        - limit
        - offset
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MixPlan'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer


    # ========================================================================
    # Download Schemas
    # ========================================================================
    DownloadJob:
      type: object
      required:
        - job_id
        - status
        - progress
        - url
        - source_type
        - created_at
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, downloading, processing, uploading, complete, failed]
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: Download progress percentage
        error:
          type: string
          description: Error message if status is failed
        url:
          type: string
          format: uri
        source_type:
          type: string
          enum: [youtube, soundcloud]
        track_id:
          type: integer
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    DownloadListResponse:
      type: object
      required:
        - jobs
      properties:
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/DownloadJob'

    InitiateDownloadRequest:
      type: object
      additionalProperties: false
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          maxLength: 4096
        source_type:
          type: string
          deprecated: true
          description: Legacy presentation field. Provider is derived from url server-side.
          enum: [youtube, soundcloud]
        page_metadata:
          type: object
          additionalProperties: false
          properties:
            title: { type: string, maxLength: 500 }
            thumbnail: { type: string, format: uri, maxLength: 2048 }

    InitiateDownloadResponse:
      type: object
      required: [job_id, status, sourceDecisionId]
      properties:
        job_id: { type: string, format: uuid }
        status: { type: string, enum: [queued] }
        sourceDecisionId:
          type: string
          format: uuid
          description: Durable accepted direct_url source decision created before Redis enqueue.

    # ========================================================================
    # Queue Schemas
    # ========================================================================
    QueueResponse:
      type: object
      required:
        - items
        - currentPosition
        - updatedAt
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/QueueItem'
        currentPosition:
          type: integer
          description: Index of the current queue item.
        updatedAt:
          type: string
          format: date-time

    QueueItem:
      type: object
      required:
        - id
        - queueItemId
        - position
        - kind
        - playbackState
        - progress
        - canPlay
        - canRetry
        - canRemove
        - addedAt
        - updatedAt
      properties:
        id:
          type: string
        queueItemId:
          type: string
        position:
          type: integer
        kind:
          type: string
          enum: [track, source]
        trackId:
          type: integer
          format: int64
          nullable: true
        playbackState:
          type: string
          enum: [queued, downloading, processing, uploading, playable, failed]
        downloadJobId:
          type: string
          nullable: true
        sourceCandidate:
          $ref: '#/components/schemas/QueueSourceCandidate'
          nullable: true
        title:
          type: string
        artist:
          type: string
        album:
          type: string
        uploader:
          type: string
        durationMs:
          type: integer
        thumbnailUrl:
          type: string
        progress:
          type: integer
          minimum: 0
          maximum: 100
        error:
          type: string
          nullable: true
        analysisStatus:
          type: string
        analysisSummary:
          type: object
          additionalProperties: true
        analysisOverrides:
          type: object
          additionalProperties: true
        analysisUpdatedAt:
          type: string
          format: date-time
        canPlay:
          type: boolean
        canRetry:
          type: boolean
        canRemove:
          type: boolean
        addedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    QueueSourceCandidate:
      type: object
      required:
        - provider
        - sourceUrl
        - title
      properties:
        candidateId:
          type: string
        provider:
          type: string
        sourceUrl:
          type: string
          format: uri
        title:
          type: string
        artist:
          type: string
        album:
          type: string
        uploader:
          type: string
        durationMs:
          type: integer
        thumbnailUrl:
          type: string
          format: uri

    DiscoveryCandidate:
      allOf:
        - $ref: '#/components/schemas/QueueSourceCandidate'
        - type: object
          required: [candidateId, downloadable, playable]
          properties:
            sourceId: { type: string }
            downloadable: { type: boolean }
            playable: { type: boolean }
            explicit: { type: boolean, nullable: true }
            metadata: { type: object, additionalProperties: true }

    DiscoverySearchResponse:
      type: object
      required: [query, results, sections, providers, selectionRequired]
      properties:
        query: { type: string }
        results:
          type: array
          items: { $ref: '#/components/schemas/DiscoveryCandidate' }
        sections: { type: array, items: { type: object, additionalProperties: true } }
        providers: { type: array, items: { type: object, additionalProperties: true } }
        selectionRequired: { type: boolean }
        selectionSessionId: { type: string, format: uuid }
        recommendedCandidateId: { type: string }
        selectionExpiresAt: { type: string, format: date-time }

    ResolveDiscoveryURLResponse:
      type: object
      required: [candidate, selectionRequired]
      properties:
        candidate: { $ref: '#/components/schemas/DiscoveryCandidate' }
        selectionRequired: { type: boolean }
        selectionSessionId: { type: string, format: uuid }
        recommendedCandidateId: { type: string }
        selectionExpiresAt: { type: string, format: date-time }

    DiscoveryAssistResponse:
      type: object
      required: [status, selectionRequired]
      properties:
        status: { type: string, enum: [ok, disabled, clarification, error] }
        assistantText: { type: string }
        intent: { type: object, additionalProperties: true }
        clarification: { type: object, additionalProperties: true }
        search: { $ref: '#/components/schemas/DiscoverySearchResponse' }
        candidates:
          type: array
          items: { $ref: '#/components/schemas/DiscoveryCandidate' }
        caveats: { type: array, items: { type: string } }
        suggestedActions: { type: array, items: { type: object, additionalProperties: true } }
        error: { type: object, additionalProperties: true }
        selectionRequired: { type: boolean }
        selectionSessionId: { type: string, format: uuid }
        recommendedCandidateId: { type: string }
        selectionExpiresAt: { type: string, format: date-time }

    AddQueueItemRequest:
      type: object
      additionalProperties: false
      properties:
        position:
          type: string
          default: last
          description: Add item after current, at end, or at a numeric queue index.
        trackId:
          type: integer
          format: int64
          description: Existing playable track ID to enqueue.
        sourceDecisionId:
          type: string
          format: uuid
          description: Server-owned source selection decision. The candidate URL is never accepted from this request.
      oneOf:
        - required: [trackId]
        - required: [sourceDecisionId]

    SourceDecisionQueueResponse:
      type: object
      required: [queue, downloadJobId, idempotent]
      properties:
        queue: { $ref: '#/components/schemas/QueueResponse' }
        downloadJobId: { type: string, format: uuid }
        idempotent: { type: boolean }

    CreateSourceSelectionRequest:
      type: object
      additionalProperties: false
      required: [sessionId, candidateId, action]
      properties:
        sessionId: { type: string, format: uuid }
        candidateId: { type: string, minLength: 1 }
        action: { type: string, enum: [accepted, overridden] }
        reason: { type: string, maxLength: 2000 }

    SourceSelectionDecision:
      type: object
      required: [id, selectedCandidateId, recommendedCandidateId, action, origin, selectedCandidate, sourceQuality, createdAt]
      properties:
        id: { type: string, format: uuid }
        sessionId: { type: string, format: uuid, nullable: true }
        selectedCandidateId: { type: string }
        recommendedCandidateId: { type: string }
        action: { type: string, enum: [accepted, overridden] }
        origin: { type: string }
        reason: { type: string, nullable: true }
        selectedCandidate: { $ref: '#/components/schemas/QueueSourceCandidate' }
        sourceQuality: { type: object, additionalProperties: true }
        downloadJobId: { type: string, format: uuid, nullable: true }
        trackId: { type: integer, format: int64, nullable: true }
        createdAt: { type: string, format: date-time }

    SourceSelectionListResponse:
      type: object
      required: [items, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SourceSelectionDecision' }
        limit: { type: integer }
        offset: { type: integer }

    ReorderQueueRequest:
      type: object
      required:
        - queueItemId
        - toPosition
      properties:
        queueItemId:
          type: string
          minLength: 1
        toPosition:
          type: integer
          minimum: 0

    # ========================================================================
    # Error Schema
    # ========================================================================
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          additionalProperties: true
          description: Additional error details
