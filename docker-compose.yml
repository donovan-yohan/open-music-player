services:
  # =============================================================================
  # Backend API Service
  # =============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: server-runtime
    container_name: omp-backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      # Server
      SERVER_ADDR: ":8080"

      # Database
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-omp}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-omp_dev_password}
      DB_NAME: ${POSTGRES_DB:-openmusicplayer}

      # Redis
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_ADDR: redis:6379
      REDIS_URL: redis://redis:6379

      # MinIO/S3 Storage
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-audio-files}
      MINIO_USE_SSL: "false"
      S3_USE_PATH_STYLE: "true"
      ANALYZER_BASE_URL: http://analyzer:18190
      ANALYZER_CONCURRENCY: ${ANALYZER_CONCURRENCY:-1}

      # Optional source-quality judge. Keep model host and credentials in the
      # operator environment; discovery remains deterministic while disabled.
      SOURCE_QUALITY_LLM_ENABLED: ${SOURCE_QUALITY_LLM_ENABLED:-false}
      SOURCE_QUALITY_LLM_BASE_URL: ${SOURCE_QUALITY_LLM_BASE_URL:-http://host.docker.internal:11434}
      SOURCE_QUALITY_LLM_MODEL: ${SOURCE_QUALITY_LLM_MODEL:-}
      SOURCE_QUALITY_LLM_TIMEOUT_MS: ${SOURCE_QUALITY_LLM_TIMEOUT_MS:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}

      # Private async-agent research gateway. Unset by default; this does not
      # change ordinary discovery or expose an unauthenticated route.
      OMP_AGENT_SERVICE_TOKEN: ${OMP_AGENT_SERVICE_TOKEN:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}

      # Durable research remains off by default. API instances do not claim
      # research jobs; the explicit research-worker profile owns that lifecycle.
      RESEARCH_ENABLED: ${RESEARCH_ENABLED:-false}
      RESEARCH_WORKER_ENABLED: "false"
      RESEARCH_DEEP_AGENT_ENABLED: ${RESEARCH_DEEP_AGENT_ENABLED:-false}
      RESEARCH_DEEP_AGENT_DARK_LAUNCH_ENABLED: ${RESEARCH_DEEP_AGENT_DARK_LAUNCH_ENABLED:-false}
      RESEARCH_DEEP_AGENT_SURFACE_REVISIONS: ${RESEARCH_DEEP_AGENT_SURFACE_REVISIONS:-false}
      RESEARCH_DEEP_AGENT_COHORT_BPS: ${RESEARCH_DEEP_AGENT_COHORT_BPS:-0}
      RESEARCH_DEEP_AGENT_WEB_ENABLED: ${RESEARCH_DEEP_AGENT_WEB_ENABLED:-false}

      # Auth
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}

      # Workers
      WORKER_COUNT: ${WORKER_COUNT:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      analyzer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - omp-network

  analyzer:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: analyzer-runtime
    container_name: omp-analyzer
    restart: unless-stopped
    environment:
      ANALYZER_ADDR: ":18190"
      ANALYZER_CONCURRENCY: ${ANALYZER_CONCURRENCY:-1}
      ANALYZER_MIR_HELPER: /app/audio_mir.py
      ANALYZER_BEAT_MODEL: /app/models/beat_this-final0.ckpt
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-audio-files}
      MINIO_USE_SSL: "false"
      S3_USE_PATH_STYLE: "true"
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18190/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - omp-network

  # Opt-in only. This is the existing Go durable worker process with the
  # existing Python child command packaged beside it. The child inherits only
  # the Go allowlisted model environment, never the database or service secrets.
  research-worker:
    build:
      context: .
      dockerfile: Dockerfile.research-worker
    restart: unless-stopped
    profiles:
      - research-worker
    environment:
      SERVER_ADDR: ":8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-omp}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-omp_dev_password}
      DB_NAME: ${POSTGRES_DB:-openmusicplayer}
      # This dedicated process uses Postgres-backed research only. Do not start
      # Redis/download workers alongside the single durable research worker.
      REDIS_ENABLED: "false"
      WORKER_COUNT: "0"
      RESEARCH_ENABLED: ${RESEARCH_ENABLED:-false}
      RESEARCH_WORKER_ENABLED: "true"
      RESEARCH_COMMAND: candidate-assembly-worker
      RESEARCH_WORKER_ID: research-compose
      RESEARCH_MAX_ATTEMPTS: ${RESEARCH_MAX_ATTEMPTS:-3}
      RESEARCH_DIRECT_JUDGE_ENABLED: ${RESEARCH_DIRECT_JUDGE_ENABLED:-true}
      RESEARCH_DEEP_AGENT_ENABLED: ${RESEARCH_DEEP_AGENT_ENABLED:-false}
      RESEARCH_DEEP_AGENT_DARK_LAUNCH_ENABLED: ${RESEARCH_DEEP_AGENT_DARK_LAUNCH_ENABLED:-false}
      RESEARCH_DEEP_AGENT_SURFACE_REVISIONS: ${RESEARCH_DEEP_AGENT_SURFACE_REVISIONS:-false}
      RESEARCH_DEEP_AGENT_COHORT_BPS: ${RESEARCH_DEEP_AGENT_COHORT_BPS:-0}
      RESEARCH_DEEP_AGENT_WEB_ENABLED: ${RESEARCH_DEEP_AGENT_WEB_ENABLED:-false}
      RESEARCH_MAX_TOOL_CALLS: ${RESEARCH_MAX_TOOL_CALLS:-8}
      RESEARCH_MAX_MODEL_CALLS: ${RESEARCH_MAX_MODEL_CALLS:-10}
      RESEARCH_RECURSION_LIMIT: ${RESEARCH_RECURSION_LIMIT:-12}
      RESEARCH_MAX_CANDIDATES_IN: ${RESEARCH_MAX_CANDIDATES_IN:-25}
      RESEARCH_MAX_RECOMMENDATIONS: ${RESEARCH_MAX_RECOMMENDATIONS:-10}
      RESEARCH_WALL_CLOCK_MS: ${RESEARCH_WALL_CLOCK_MS:-180000}
      RESEARCH_MAX_REQUEST_BYTES: ${RESEARCH_MAX_REQUEST_BYTES:-49152}
      RESEARCH_MAX_RESPONSE_BYTES: ${RESEARCH_MAX_RESPONSE_BYTES:-65536}
      RESEARCH_MAX_TOKENS: ${RESEARCH_MAX_TOKENS:-4096}
      RESEARCH_POLL_INTERVAL_MS: ${RESEARCH_POLL_INTERVAL_MS:-1000}
      RESEARCH_LEASE_DURATION_MS: ${RESEARCH_LEASE_DURATION_MS:-30000}
      RESEARCH_RENEW_INTERVAL_MS: ${RESEARCH_RENEW_INTERVAL_MS:-10000}
      RESEARCH_RUN_TIMEOUT_MS: ${RESEARCH_RUN_TIMEOUT_MS:-120000}
      RESEARCH_CANCEL_GRACE_MS: ${RESEARCH_CANCEL_GRACE_MS:-2000}
      RESEARCH_SHUTDOWN_TIMEOUT_MS: ${RESEARCH_SHUTDOWN_TIMEOUT_MS:-30000}
      AGENT_SEARCH_BASE_URL: ${AGENT_SEARCH_BASE_URL:-}
      AGENT_SEARCH_API_KEY: ${AGENT_SEARCH_API_KEY:-}
      AGENT_SEARCH_MODEL: ${AGENT_SEARCH_MODEL:-}
      AGENT_SEARCH_TIMEOUT_S: ${AGENT_SEARCH_TIMEOUT_S:-90}
      AGENT_SEARCH_RUN_TIMEOUT_S: ${AGENT_SEARCH_RUN_TIMEOUT_S:-3600}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - omp-network

  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: omp-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omp_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-openmusicplayer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omp} -d ${POSTGRES_DB:-openmusicplayer}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - omp-network

  # =============================================================================
  # Redis Cache & Queue
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: omp-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - omp-network

  # =============================================================================
  # MinIO Object Storage (S3-compatible)
  # =============================================================================
  minio:
    image: minio/minio:latest
    container_name: omp-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - omp-network

  # =============================================================================
  # MinIO Bucket Initialization
  # =============================================================================
  minio-init:
    image: minio/mc:latest
    container_name: omp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/$${MINIO_BUCKET:-audio-files} --ignore-existing;
      mc anonymous set download local/$${MINIO_BUCKET:-audio-files};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-audio-files}
    networks:
      - omp-network

  # =============================================================================
  # Nginx Reverse Proxy (Production)
  # =============================================================================
  nginx:
    image: nginx:alpine
    container_name: omp-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - production
    networks:
      - omp-network

networks:
  omp-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
