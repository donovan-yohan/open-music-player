name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  delivery-harness:
    name: Delivery Harness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run agentic delivery harness
        run: scripts/lint delivery

      - name: Plan exact-head dev cycle
        run: scripts/agentic-cycle --committed-only --base origin/main

      - name: Test release audit classifier
        run: scripts/release-audit --self-test

  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: openmusicplayer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run repository backend lint
        run: ../scripts/lint backend

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.63.4
          install-mode: goinstall
          skip-cache: true
          working-directory: backend

      - name: Run tests
        run: ../scripts/test backend
        env:
          BACKEND_GO_TEST_ARGS: -v -race -coverprofile=coverage.out
          DATABASE_URL: postgres://test:test@localhost:5432/openmusicplayer_test?sslmode=disable
          REDIS_URL: redis://localhost:6379

      - name: Run AI assist replay eval
        run: ../scripts/eval ai-assist --mode replay --output "$RUNNER_TEMP/ai-assist-replay.jsonl"

      - name: Build
        run: ../scripts/build backend

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.out
          flags: backend
        continue-on-error: true

  analyzer:
    name: Audio Analyzer (MIR)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint analyzer wiring
        run: scripts/lint analyzer

      - name: Run analyzer unit image
        run: scripts/test analyzer

      - name: Build pinned analyzer image
        run: scripts/build analyzer

  client:
    name: Client (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: ../scripts/lint client

      - name: Run tests
        run: ../scripts/test client
        env:
          FLUTTER_TEST_ARGS: --coverage

      - name: Tune Gradle for CI APK build
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          cat >> android/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx3g -Xms512m -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8
          org.gradle.workers.max=2
          kotlin.daemon.jvmargs=-Xmx1g -XX:MaxMetaspaceSize=512m
          EOF

      - name: Build debug APK
        if: ${{ github.event_name == 'pull_request' }}
        timeout-minutes: 30
        run: ../scripts/build client

      - name: Upload debug APK artifact
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: open-music-player-pr-${{ github.event.pull_request.number }}-debug-apk
          path: client/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: client/coverage/lcov.info
          flags: client
        continue-on-error: true

  extension:
    name: Extension (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: ../scripts/lint extension

      - name: Run extension tests
        run: ../scripts/test extension

      - name: Build
        run: ../scripts/build extension

      - name: Package extension
        run: |
          mkdir -p dist-zip
          cd dist
          zip -r ../dist-zip/extension.zip .

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: extension/dist-zip/extension.zip
          retention-days: 7

  agent-evals:
    name: Agent Search Evals
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.16"
          enable-cache: true
          cache-dependency-glob: agents/candidate_assembly/uv.lock

      - name: Sync candidate-assembly package
        working-directory: agents/candidate_assembly
        run: uv sync

      - name: Run Go-to-Python worker contract test
        working-directory: backend
        run: GOFLAGS=-buildvcs=false go test ./internal/research -run '^TestCommandRunnerGoToPythonWorkerContract$'

      - name: Run candidate-assembly unit tests
        working-directory: agents/candidate_assembly
        run: uv run pytest -q

      - name: Run agent-search replay eval
        run: scripts/eval agent-search --mode replay --output "$RUNNER_TEMP/agent-search-replay.jsonl"

  local-smoke:
    name: Local Stack Smoke
    runs-on: ubuntu-latest
    env:
      SERVER_PORT: 18080
      POSTGRES_PORT: 15434
      REDIS_PORT: 16380
      MINIO_PORT: 19000
      MINIO_CONSOLE_PORT: 19001
      OMP_BACKEND_BASE_URL: http://localhost:18080

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start isolated low-memory stack
        run: scripts/dev isolated

      - name: Run isolated smoke
        run: scripts/smoke isolated

      - name: Run isolated playback smoke
        run: scripts/smoke playback-isolated

      - name: Cleanup low-memory stack
        if: always()
        run: scripts/local-low-memory.sh clean
