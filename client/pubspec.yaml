name: open_music_player
description: Sound Q - Cross-platform music player client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.2
  http: ^1.2.0
  shared_preferences: ^2.2.2
  web: ^1.1.1
  url_launcher: ^6.2.4
  package_info_plus: ^9.0.1
  cached_network_image: ^3.3.1
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  audio_session: ^0.1.25
  rxdart: ^0.27.7
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  connectivity_plus: ^6.0.0
  local_auth: ^2.3.0
  # Direct pin: just_audio 0.9.x otherwise resolves just_audio_web 0.4.11,
  # which fails Flutter 3.44 web compilation under Dart 3.12.
  just_audio_web: ^0.4.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/soundq-placeholder-logo.png
